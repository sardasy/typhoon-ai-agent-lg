; mypy configuration for THAA.
;
; THAA was written pre-mypy. The goal here is **catching real type
; bugs** (wrong return type, accessing missing attributes, unreachable
; code) without churning over the existing, mostly-untyped surface.
; That means leaving annotation completeness OFF globally and letting
; per-module overrides ratchet up over time.
;
; Inner loop:
;   python -m mypy           # full check
;   python -m mypy src/twin.py  # one module
;
; To raise the bar on a module: copy a [mypy-src.<module>] block and
; add ``disallow_untyped_defs = True`` once the module is annotated.

[mypy]
python_version = 3.12
ignore_missing_imports = True
follow_imports = silent

; Catch real bugs. Don't fail on missing annotations.
warn_redundant_casts = True
warn_unreachable = True
no_implicit_optional = True
strict_equality = True

; Demo / one-shot scripts: skip.
exclude = (?x)(
    scripts/demo_sqlite_resume\.py$
    | scripts/index_knowledge\.py$
  )

files = src, scripts


; ---------------------------------------------------------------------
; Per-module strictness overrides (canaries that are mypy-clean today)
; ---------------------------------------------------------------------

[mypy-src.constants]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-src.audit]
disallow_untyped_defs = True
disallow_incomplete_defs = True


; ---------------------------------------------------------------------
; Per-module relax (modules whose third-party libs aren't fully typed)
; ---------------------------------------------------------------------

[mypy-src.tools.hil_tools]
ignore_errors = True

[mypy-src.tools.xcp_tools]
ignore_errors = True

; LangChain stubs are partial (ChatAnthropic kwargs, message types).
; Unblock these two modules until upstream stubs catch up.
[mypy-src.nodes.analyze_failure]
ignore_errors = True

[mypy-src.nodes.plan_tests]
ignore_errors = True

[mypy-src.tools.rag_tools]
ignore_errors = True

[mypy-src.evaluator]
ignore_errors = True

[mypy-src.fault_templates]
ignore_errors = True

[mypy-src.tools.hil_api_docs]
ignore_errors = True

[mypy-src.tools.can_tools]
ignore_errors = True

[mypy-src.tools.pytest_api]
ignore_errors = True

[mypy-src.nodes.parse_tse]
ignore_errors = True

[mypy-src.nodes.generate_tests]
ignore_errors = True

[mypy-src.nodes.map_requirements]
ignore_errors = True

[mypy-src.nodes.validate_code]
ignore_errors = True

[mypy-src.nodes.export_tests]
ignore_errors = True

[mypy-src.graph_codegen]
ignore_errors = True

[mypy-src.reporter]
ignore_errors = True
