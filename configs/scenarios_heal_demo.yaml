# =============================================================================
# Self-Healing Loop Demo (mock-friendly, no Typhoon HIL required)
# =============================================================================
# Purpose: showcase the LangGraph self-healing path
#   execute_scenario -> FAIL -> analyze_failure (Claude) -> apply_fix (XCP)
#   -> execute_scenario -> ... up to MAX_HEAL_RETRIES=3
#
# This scenario uses a deliberately-failing rule (`relay_must_trip`) on a
# signal name that the mock executor returns as zero by default. After
# `apply_fix` writes a calibration via XCP, the mock capture path becomes
# `retry-aware` and returns waveform data that satisfies the rule on the
# second retry, demonstrating loop convergence.
# =============================================================================

model:
  path: "models/vsm_demo.tse"        # mock-only -- no real .tse needed
  device: "VHIL"

scenarios:

  vsm_inertia_heal_demo:
    description: "VSM tuning failure -> Claude diagnoses J too low -> apply_fix retunes J -> pass"
    category: "control_performance"
    standard_ref: "IEEE 2800-2022 Section 7.2.2 (synthetic inertia, demo)"
    parameters:
      fault_template: "vsm_steady_state"
      Pref_w: 5000.0
      Qref_var: 0.0
      J: 0.05            # intentionally too low -> oscillation -> trip relay
      D: 10.0
      settle_s: 0.2
      heal_target_param: "J"     # hint for demo executor
      heal_target_threshold: 0.3 # mock passes once J >= this
    measurements:
      - "Pe"
      - "VSM_oscillation_relay"   # mock returns 0 by default => relay_must_trip fails
    pass_fail_rules:
      relay_must_trip: true
      response_time_max_ms: 500
