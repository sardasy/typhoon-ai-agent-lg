# =============================================================================
# IEEE 2800-2022 GFM scenarios for 3ph_inverter.tse (virtual sync machine)
# =============================================================================
# Target schematic:  C:\Users\a\Downloads\3ph_inverter.tse
# Expected compiled: C:\Users\a\Downloads\3ph_inverter Target files\3ph_inverter.cpd
#                    (produced by SchematicAPI.compile() after detect_hw_settings())
#
# Signal contract (verified against the .tse component list):
#   SCADA inputs:   P_ref, Q_ref, J (def 0.3), D (def 10), Kv (def 1e-4)
#   Voltage probes: Va, Vb, Vc, Vab, Vbc, VDC
#   Current probes: Ia, Ib, Ic (sig_output=True), Idc_link
#   VSM probes:     Pe, Qe, w, teta, Te, w_phi
#   Grid source:    Vgrid (core/Three Phase Voltage Source)
#   DC link source: Vdc_link (core/Voltage Source)
#
# ---- PRE-RUN REQUIREMENT (critical) ----
# The schematic Vgrid block is empty, so the class default
# (init_rms_value=0.0, init_frequency=50.0) applies: Vgrid starts at 0 V on
# a 50 Hz phasor. Vdc_link likewise starts at 0 V. Running any VSM scenario
# against this dead grid is meaningless. Before executing the graph, call:
#
#     hil.set_source_sine_waveform("Vgrid", rms=220.0, frequency=60.0,
#                                   phase=0.0)
#     hil.set_source_constant_value("Vdc_link", value=700.0)
#
# These values match `runtime_init_required` below. The current fault
# templates (vsm_steady_state / vsm_pref_step / voltage_sag / phase_jump)
# do NOT initialize Vgrid -- they only drive SCADA inputs and tune grid
# amplitude via set_source_sine_waveform mid-scenario. Extending a template
# with a `grid_init` helper is tracked as a separate follow-up task.
#
# ---- Retarget note ----
# Schematic targets HIL101 but SchematicAPI.detect_hw_settings() auto-retargets
# to the connected HIL404 (serial 00404-05-00190, rev 3, config 3) during
# compile. Verified 2026-04-20.
# =============================================================================

model:
  path: "C:/Users/a/Downloads/3ph_inverter Target files/3ph_inverter.cpd"
  device: "HIL404"

  # Timing: HIL solver step vs VSM controller tick (the .tse hard-codes
  # Ts = 250e-6 = 4 kHz for the VSM control loop, matching carrier_freq_hz).
  timestep_us: 1.0                   # HIL solver step
  controller_ts_us: 250              # VSM control tick (Ts in .tse init)

  # Grid electrical (Korean LV: 380 V LL / 220 V LN at 60 Hz).
  # The .tse init_frequency default is 50 Hz -- runtime_init_required overrides.
  grid_voltage_rms_ll: 380
  grid_voltage_rms_ln: 220
  grid_frequency_hz: 60

  # Switching
  carrier_freq_hz: 4000
  deadtime_us: 0.5                   # d_time = 0.5e-6 in Three Phase Inverter1

  ieee_2800_category: "Cat A"

  # VSM tunables -- SCADA defaults from the .tse
  vsm_defaults:
    J: 0.3
    D: 10.0
    Kv: 1.0e-4

  # Documentation-only -- values a pre-run hook should push into the sim.
  # Not yet consumed by any node; see "PRE-RUN REQUIREMENT" at top of file.
  runtime_init_required:
    Vgrid:
      rms: 220.0                     # LN RMS
      frequency: 60.0
      phase: 0.0
    Vdc_link:
      value: 700.0                   # DC bus; Vpeak_LN ~311 -> 2x margin

  # Passive network (from CODE model_init; kept as reference for scenario math)
  lcl_filter:
    L_inv: 2.6e-3                    # inverter-side inductor [H]
    R_inv: 0.1                       # inverter-side series R [ohm]
    Cf: 20.0e-6                      # filter capacitor [F]
    Resr: 50.0e-3                    # Cf ESR [ohm]
    Lgrid: 0.5e-3                    # grid-side inductor [H]
    Rgrid: 50.0e-3                   # grid-side series R [ohm]
    f_resonance_hz: 880              # ~= 1/(2 pi sqrt(L_eff Cf)) with L_eff = L||Lg

  # Short-circuit ratio estimate at Pbase = 5 kW, Vbase = 220 V LN.
  # Z_grid ~ 0.196 ohm, Z_base ~ 29 ohm -> SCR ~ 150 (strong grid).
  scr_estimate: 150

safety:
  max_voltage: 600.0                 # 220 V LN peak ~311 V, +93% margin
  max_current: 50.0
  max_fault_injections: 10
  auto_retry_limit: 3
  timeout_per_test_s: 30.0

ai:
  model: "claude-sonnet-4-20250514"
  max_tokens: 2048
  temperature: 0.0

scenarios:

  # =========================================================================
  # IEEE 2800 section 9 -- Voltage source behavior
  # =========================================================================

  gfm_steady_state_zero_export:
    description: "Steady-state at Pref=0, Qref=0 -- Va RMS within +/-5% of nominal"
    category: "grid_compliance"
    standard_ref: "IEEE 2800-2022 Section 9"
    parameters:
      fault_template: "vsm_steady_state"
      Pref_w: 0.0
      Qref_var: 0.0
      settle_s: 2.0
    measurements: ["Va", "Vb", "Vc", "Pe", "Qe"]
    pass_fail_rules:
      voltage_tolerance_pct: 5.0
      nominal_voltage_rms: 220        # 220 V LN RMS (Korean LV)

  gfm_active_power_tracking_med:
    description: "Pe tracks Pref=5kW within +/-10% after 3s settle"
    category: "control_performance"
    standard_ref: "IEEE 2800-2022 Section 9"
    parameters:
      fault_template: "vsm_steady_state"
      Pref_w: 5000.0
      Qref_var: 0.0
      settle_s: 3.0
    measurements: ["Va", "Ia", "Ib", "Ic", "Pe"]
    pass_fail_rules:
      power_tolerance_pct: 10.0
      target_p_w: 5000.0

  gfm_reactive_power_tracking:
    description: "Qe tracks Qref=2kVAr within +/-10% after 3s settle"
    category: "control_performance"
    standard_ref: "IEEE 2800-2022 Section 9"
    parameters:
      fault_template: "vsm_steady_state"
      Pref_w: 0.0
      Qref_var: 2000.0
      settle_s: 3.0
    measurements: ["Va", "Ia", "Pe", "Qe"]
    pass_fail_rules:
      power_tolerance_pct: 10.0
      target_q_var: 2000.0

  # =========================================================================
  # IEEE 2800 section 7.2.2 -- Virtual inertia (synthetic inertia)
  # =========================================================================

  gfm_inertia_pref_step_nominal:
    description: "Pref step 2->6 kW with nominal J=0.3, check RoCoF bound"
    category: "grid_support"
    standard_ref: "IEEE 2800-2022 Section 7.2.2"
    parameters:
      fault_template: "vsm_pref_step"
      J: 0.3
      D: 10.0
      Pref_initial_w: 2000.0
      Pref_step_w: 6000.0
      settle_s: 2.0
      post_step_s: 2.0
    measurements: ["Pe", "w", "Te"]
    pass_fail_rules:
      rocof_max_hz_per_s: 1.0
      response_time_max_ms: 500

  gfm_inertia_low_J_oscillation:
    description: "Same step with J=0.1 -- expect larger RoCoF / oscillation"
    category: "grid_support"
    standard_ref: "IEEE 2800-2022 Section 7.2.2"
    parameters:
      fault_template: "vsm_pref_step"
      J: 0.1
      D: 10.0
      Pref_initial_w: 2000.0
      Pref_step_w: 6000.0
      settle_s: 2.0
      post_step_s: 2.0
    measurements: ["Pe", "w"]
    pass_fail_rules:
      rocof_max_hz_per_s: 3.0         # relaxed -- low J intentionally worse

  # =========================================================================
  # IEEE 2800 section 7.3 -- Phase jump
  # =========================================================================

  gfm_phase_jump_10deg:
    description: "10 degree grid phase step, inverter must resync"
    category: "grid_disturbance"
    standard_ref: "IEEE 2800-2022 Section 7.3"
    parameters:
      fault_template: "phase_jump"
      signal_ac_sources: ["Vgrid"]
      phase_step_deg: 10.0
      pre_step_s: 2.0
      post_step_s: 3.0
    measurements: ["Va", "Pe", "w", "teta"]
    pass_fail_rules:
      response_time_max_ms: 1000
      must_not_trip: true

  gfm_phase_jump_20deg:
    description: "20 degree grid phase step (within IEEE 2800 25 deg cap)"
    category: "grid_disturbance"
    standard_ref: "IEEE 2800-2022 Section 7.3"
    parameters:
      fault_template: "phase_jump"
      signal_ac_sources: ["Vgrid"]
      phase_step_deg: 20.0
      pre_step_s: 2.0
      post_step_s: 3.0
    measurements: ["Va", "Pe", "w", "teta"]
    pass_fail_rules:
      response_time_max_ms: 1500
      must_not_trip: true

  # =========================================================================
  # IEEE 1547 / 2800 -- LVRT ride-through
  # =========================================================================

  gfm_lvrt_sag_0p7pu_300ms:
    description: "Grid sag to 0.7 pu for 300 ms, inverter rides through"
    category: "grid_disturbance"
    standard_ref: "IEEE 1547-2018 Section 6.4"
    parameters:
      fault_template: "voltage_sag"
      signal_ac_sources: ["Vgrid"]
      nominal_voltage_peak: 311.13    # 220 V LN RMS * sqrt(2)
      sag_voltage_pu: 0.7
      pre_fault_duration_s: 2.0
      fault_duration_s: 0.3
      post_fault_duration_s: 1.5
    measurements: ["Va", "Ia", "Pe", "VDC"]
    pass_fail_rules:
      min_voltage_pu: 0.65
      must_not_trip: true

  # =========================================================================
  # Power quality -- steady-state THD
  # =========================================================================

  gfm_voltage_thd_clean_grid:
    description: "Voltage THD <= 5% at Pref=5 kW on clean grid (IEEE 519)"
    category: "power_quality"
    standard_ref: "IEEE 519-2022"
    parameters:
      fault_template: "vsm_steady_state"
      Pref_w: 5000.0
      Qref_var: 0.0
      settle_s: 3.0
    measurements: ["Va", "Vb", "Vc"]
    pass_fail_rules:
      voltage_thd_max_pct: 5.0
