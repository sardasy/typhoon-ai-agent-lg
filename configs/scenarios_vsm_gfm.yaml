# =============================================================================
# IEEE 2800-2022 GFM Compliance Scenarios — VSM Inverter (invertertest.tse)
# =============================================================================
# Drives the parent LangGraph agent against the Virtual Synchronous Machine
# (VSM) inverter model. Each scenario maps directly to a pytest test in
# test_project_vsm_gfm/tests/, but is also runnable through the agent's
# stimulus + capture + evaluate pipeline.
#
# Self-healing loop: the analyze_failure node can rewrite the VSM tuning
# SCADA inputs (J, D, Kv) when a scenario fails — see writable_xcp_params
# in src/validator.py for the allow-list extension.
#
# Standards: IEEE 2800-2022 (DER on transmission), IEEE 1547-2018 (default
# fall-back when 2800 is silent), IEEE 519 (THD).
# =============================================================================

model:
  path: "C:/Users/junpr/Downloads/invertertest Target files/invertertest.cpd"
  device: "HIL101"
  safety_profile: vsm_gfm            # P0 #1: 600V max for 230V_LL grid
  timestep_us: 1.0
  grid_voltage_rms_ll: 230
  grid_frequency_hz: 50
  carrier_freq_hz: 4000
  ieee_2800_category: "Cat A"          # transmission-connected IBR
  vsm_defaults:
    J: 0.3
    D: 10.0
    Kv: 1.0e-4

scenarios:

  # =========================================================================
  # IEEE 2800 §9 — Voltage Source Behavior
  # =========================================================================

  vsm_voltage_magnitude_steady_state:
    description: "Va RMS within ±5% of nominal at zero export (IEEE 2800 §9)"
    category: "grid_compliance"
    standard_ref: "IEEE 2800-2022 Section 9"
    parameters:
      fault_template: "vsm_steady_state"
      Pref_w: 0.0
      Qref_var: 0.0
      settle_s: 2.0
    measurements: ["Va", "Vb", "Vc"]
    pass_fail_rules:
      voltage_tolerance_pct: 5.0
      nominal_voltage_rms: 230

  vsm_active_power_tracking_low:
    description: "Pe tracks Pref=2kW within 10%"
    category: "control_performance"
    standard_ref: "IEEE 2800-2022 Section 9"
    parameters:
      fault_template: "vsm_steady_state"
      Pref_w: 2000.0
      Qref_var: 0.0
      settle_s: 3.0
    measurements: ["Va", "Vb", "Vc", "Ia", "Ib", "Ic", "Pe"]
    pass_fail_rules:
      power_tolerance_pct: 10.0
      target_p_w: 2000.0

  vsm_active_power_tracking_med:
    description: "Pe tracks Pref=5kW within 10%"
    category: "control_performance"
    standard_ref: "IEEE 2800-2022 Section 9"
    parameters:
      fault_template: "vsm_steady_state"
      Pref_w: 5000.0
      settle_s: 3.0
    measurements: ["Va", "Vb", "Vc", "Ia", "Ib", "Ic", "Pe"]
    pass_fail_rules:
      power_tolerance_pct: 10.0
      target_p_w: 5000.0

  vsm_active_power_tracking_high:
    description: "Pe tracks Pref=8kW within 10%"
    category: "control_performance"
    standard_ref: "IEEE 2800-2022 Section 9"
    parameters:
      fault_template: "vsm_steady_state"
      Pref_w: 8000.0
      settle_s: 3.0
    measurements: ["Va", "Vb", "Vc", "Ia", "Ib", "Ic", "Pe"]
    pass_fail_rules:
      power_tolerance_pct: 10.0
      target_p_w: 8000.0

  vsm_voltage_holds_weak_grid:
    description: "Va must not collapse below 0.85 pu when grid drops to 0.9 pu"
    category: "grid_compliance"
    standard_ref: "IEEE 2800-2022 Section 9"
    parameters:
      fault_template: "voltage_sag"
      signal_ac_sources: ["Vgrid"]
      nominal_voltage_peak: 325.27
      sag_voltage_pu: 0.9
      pre_fault_duration_s: 2.0
      fault_duration_s: 1.0
      post_fault_duration_s: 1.0
    measurements: ["Va", "VLINK_1"]
    pass_fail_rules:
      min_voltage_pu: 0.85
      must_not_trip: true

  # =========================================================================
  # IEEE 2800 §7.2.2 — Virtual Inertia (Synthetic Inertia)
  # =========================================================================

  vsm_inertia_low_J:
    description: "Pref step 2->8kW with J=0.1 (low inertia)"
    category: "grid_support"
    standard_ref: "IEEE 2800-2022 Section 7.2.2"
    parameters:
      fault_template: "vsm_pref_step"
      J: 0.1
      D: 10.0
      Pref_initial_w: 2000.0
      Pref_step_w: 8000.0
      pre_step_s: 3.0
      capture_s: 2.5
    measurements: ["w", "Pe"]
    pass_fail_rules:
      settling_time_max_s: 5.0
      settling_tolerance_pct: 2.0

  vsm_inertia_med_J:
    description: "Pref step with J=0.3 (medium inertia, default)"
    category: "grid_support"
    standard_ref: "IEEE 2800-2022 Section 7.2.2"
    parameters:
      fault_template: "vsm_pref_step"
      J: 0.3
      D: 10.0
      Pref_initial_w: 2000.0
      Pref_step_w: 8000.0
      pre_step_s: 3.0
      capture_s: 2.5
    measurements: ["w", "Pe"]
    pass_fail_rules:
      settling_time_max_s: 5.0

  vsm_inertia_high_J:
    description: "Pref step with J=0.8 (high inertia, slowest response)"
    category: "grid_support"
    standard_ref: "IEEE 2800-2022 Section 7.2.2"
    parameters:
      fault_template: "vsm_pref_step"
      J: 0.8
      D: 10.0
      Pref_initial_w: 2000.0
      Pref_step_w: 8000.0
      pre_step_s: 3.0
      capture_s: 2.5
    measurements: ["w", "Pe"]
    pass_fail_rules:
      settling_time_max_s: 5.0

  vsm_rocof_bounded:
    description: "ROCOF stays under 5 Hz/s during Pref step"
    category: "grid_support"
    standard_ref: "IEEE 2800-2022 Section 7.2.2"
    parameters:
      fault_template: "vsm_pref_step"
      J: 0.3
      Pref_initial_w: 2000.0
      Pref_step_w: 8000.0
    measurements: ["w"]
    pass_fail_rules:
      rocof_max_hz_per_s: 5.0

  # =========================================================================
  # IEEE 2800 §7.4 — Fast Fault Current Injection (FFCI)
  # =========================================================================

  vsm_ffci_response_50pct_sag:
    description: "FFCI activates within 20 ms during 0.5 pu sag"
    category: "grid_compliance"
    standard_ref: "IEEE 2800-2022 Section 7.4"
    parameters:
      fault_template: "voltage_sag"
      signal_ac_sources: ["Vgrid"]
      nominal_voltage_peak: 325.27
      sag_voltage_pu: 0.5
      pre_fault_duration_s: 2.0
      fault_duration_s: 0.5
      post_fault_duration_s: 1.0
      Pref_w: 5000.0
    measurements: ["Va", "Ia", "Ib", "Ic", "Qe"]
    pass_fail_rules:
      ffci_response_max_ms: 20.0
      ffci_current_min_pu: 1.0

  vsm_ffci_response_30pct_sag:
    description: "FFCI activates within 20 ms during 0.3 pu sag (severe)"
    category: "grid_compliance"
    standard_ref: "IEEE 2800-2022 Section 7.4"
    parameters:
      fault_template: "voltage_sag"
      signal_ac_sources: ["Vgrid"]
      nominal_voltage_peak: 325.27
      sag_voltage_pu: 0.3
      pre_fault_duration_s: 2.0
      fault_duration_s: 0.5
      post_fault_duration_s: 1.0
      Pref_w: 5000.0
    measurements: ["Va", "Ia", "Ib", "Ic", "Qe"]
    pass_fail_rules:
      ffci_response_max_ms: 20.0
      ffci_current_min_pu: 1.0

  vsm_ffci_current_capped:
    description: "FFCI current must not exceed 1.5 pu (overcurrent limit)"
    category: "protection"
    standard_ref: "IEEE 2800-2022 Section 7.4"
    parameters:
      fault_template: "voltage_sag"
      signal_ac_sources: ["Vgrid"]
      nominal_voltage_peak: 325.27
      sag_voltage_pu: 0.2
      pre_fault_duration_s: 2.0
      fault_duration_s: 0.3
      post_fault_duration_s: 1.0
      Pref_w: 5000.0
    measurements: ["Ia", "Ib", "Ic"]
    pass_fail_rules:
      ffci_current_max_pu: 1.5

  vsm_ffci_sustained_300ms:
    description: "FFCI sustains >=1.0 pu reactive current for 300 ms"
    category: "grid_compliance"
    standard_ref: "IEEE 2800-2022 Section 7.4"
    parameters:
      fault_template: "voltage_sag"
      signal_ac_sources: ["Vgrid"]
      nominal_voltage_peak: 325.27
      sag_voltage_pu: 0.5
      pre_fault_duration_s: 2.0
      fault_duration_s: 0.4
      post_fault_duration_s: 1.0
      Pref_w: 5000.0
    measurements: ["Ia"]
    pass_fail_rules:
      ffci_sustain_threshold_pu: 0.85
      sustain_duration_s: 0.3

  # =========================================================================
  # IEEE 2800 §7.2.1 — Primary Frequency Response (P-f Droop)
  # =========================================================================

  vsm_droop_underfreq_small:
    description: "Pe must increase when grid f drops by 0.1 Hz"
    category: "grid_support"
    standard_ref: "IEEE 2800-2022 Section 7.2.1"
    parameters:
      fault_template: "frequency_deviation"
      signal_ac_sources: ["Vgrid"]
      amplitude_peak: 325.27
      nominal_frequency_hz: 50.0
      deviated_frequency_hz: 49.9
      hold_after_s: 2.0
      Pref_w: 5000.0
    measurements: ["Pe", "Ia"]
    pass_fail_rules:
      direction: "increase"
      min_change_pct: 1.0

  vsm_droop_underfreq_med:
    description: "Pe must increase significantly when grid f drops 0.5 Hz"
    category: "grid_support"
    standard_ref: "IEEE 2800-2022 Section 7.2.1"
    parameters:
      fault_template: "frequency_deviation"
      signal_ac_sources: ["Vgrid"]
      amplitude_peak: 325.27
      nominal_frequency_hz: 50.0
      deviated_frequency_hz: 49.5
      hold_after_s: 2.0
      Pref_w: 5000.0
    measurements: ["Pe"]
    pass_fail_rules:
      direction: "increase"
      min_change_pct: 5.0

  vsm_droop_overfreq_small:
    description: "Pe must decrease when grid f rises by 0.1 Hz"
    category: "grid_support"
    standard_ref: "IEEE 2800-2022 Section 7.2.1"
    parameters:
      fault_template: "frequency_deviation"
      signal_ac_sources: ["Vgrid"]
      amplitude_peak: 325.27
      nominal_frequency_hz: 50.0
      deviated_frequency_hz: 50.1
      hold_after_s: 2.0
      Pref_w: 5000.0
    measurements: ["Pe"]
    pass_fail_rules:
      direction: "decrease"
      min_change_pct: 1.0

  vsm_droop_overfreq_med:
    description: "Pe decreases significantly when f rises 0.5 Hz"
    category: "grid_support"
    standard_ref: "IEEE 2800-2022 Section 7.2.1"
    parameters:
      fault_template: "frequency_deviation"
      signal_ac_sources: ["Vgrid"]
      amplitude_peak: 325.27
      nominal_frequency_hz: 50.0
      deviated_frequency_hz: 50.5
      hold_after_s: 2.0
      Pref_w: 5000.0
    measurements: ["Pe"]
    pass_fail_rules:
      direction: "decrease"
      min_change_pct: 5.0

  vsm_primary_response_time:
    description: "Pe reaches 90% of new target within 2s of f-step"
    category: "grid_support"
    standard_ref: "IEEE 2800-2022 Section 7.2.1"
    parameters:
      fault_template: "frequency_deviation"
      signal_ac_sources: ["Vgrid"]
      amplitude_peak: 325.27
      nominal_frequency_hz: 50.0
      deviated_frequency_hz: 49.5
      hold_after_s: 3.0
      Pref_w: 5000.0
    measurements: ["Pe"]
    pass_fail_rules:
      settling_time_max_s: 2.0
      settling_tolerance_pct: 10.0

  # =========================================================================
  # IEEE 2800 §7.3 — Phase Jump Response (≤25°)
  # =========================================================================

  vsm_phase_jump_10deg:
    description: "Phase jump 10°: peak current <= 1.5 pu"
    category: "grid_compliance"
    standard_ref: "IEEE 2800-2022 Section 7.3"
    parameters:
      fault_template: "phase_jump"
      signal_ac_sources: ["Vgrid"]
      phase_step_deg: 10.0
      pre_jump_s: 3.0
      post_jump_s: 1.5
      Pref_w: 5000.0
    measurements: ["Ia", "Ib", "Ic", "w"]
    pass_fail_rules:
      max_overcurrent_pu: 1.5
      stability_recovery_s: 1.0

  vsm_phase_jump_20deg:
    description: "Phase jump 20°: still bounded current"
    category: "grid_compliance"
    standard_ref: "IEEE 2800-2022 Section 7.3"
    parameters:
      fault_template: "phase_jump"
      signal_ac_sources: ["Vgrid"]
      phase_step_deg: 20.0
      pre_jump_s: 3.0
      post_jump_s: 1.5
      Pref_w: 5000.0
    measurements: ["Ia", "w"]
    pass_fail_rules:
      max_overcurrent_pu: 1.5
      stability_recovery_s: 1.0

  vsm_phase_jump_25deg:
    description: "Phase jump 25° (IEEE 2800 max): no trip, currents bounded"
    category: "grid_compliance"
    standard_ref: "IEEE 2800-2022 Section 7.3"
    parameters:
      fault_template: "phase_jump"
      signal_ac_sources: ["Vgrid"]
      phase_step_deg: 25.0
      pre_jump_s: 3.0
      post_jump_s: 2.0
      Pref_w: 5000.0
    measurements: ["Ia", "Ib", "Ic", "w"]
    pass_fail_rules:
      max_overcurrent_pu: 1.5
      stability_recovery_s: 1.0
      must_not_trip: true

  # =========================================================================
  # IEEE 2800 §7.5 — Harmonic Distortion / Damping
  # =========================================================================

  vsm_voltage_thd_clean_grid:
    description: "Va THD <= 5% at rated power"
    category: "power_quality"
    standard_ref: "IEEE 2800-2022 Section 7.5 / IEEE 519"
    parameters:
      fault_template: "vsm_steady_state"
      Pref_w: 5000.0
      capture_window_cycles: 25
      fft_window: "hanning"
    measurements: ["Va"]
    pass_fail_rules:
      voltage_thd_max_pct: 5.0

  vsm_current_thd_rated:
    description: "Ia THD <= 5% at rated 5kW"
    category: "power_quality"
    standard_ref: "IEEE 2800-2022 Section 7.5 / IEEE 519"
    parameters:
      fault_template: "vsm_steady_state"
      Pref_w: 5000.0
      capture_window_cycles: 25
    measurements: ["Ia"]
    pass_fail_rules:
      current_thd_max_pct: 5.0
