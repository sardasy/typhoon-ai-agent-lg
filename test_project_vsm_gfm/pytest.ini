[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    gfm: Grid-forming inverter tests
    ieee2800: IEEE 2800-2022 compliance tests
    slow: Tests that take more than 30 seconds (real-time HIL captures)
addopts = -v --tb=short --strict-markers
